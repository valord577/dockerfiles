name: crossbuild-all-in-one
on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/_buildx.yml'
      - '.github/workflows/crossbuild-all-in-one.yml'
      - 'crossbuild-all-in-one/*'

env:
  GH_TOKEN: ${{ github.token }}
  S3_R2_ACCOUNT_ID: ${{ secrets.S3_R2_ACCOUNT_ID }}
  S3_R2_ACCESS_KEY: ${{ secrets.S3_R2_ACCESS_KEY }}
  S3_R2_SECRET_KEY: ${{ secrets.S3_R2_SECRET_KEY }}
  S3_R2_STORAGE_BUCKET: ${{ secrets.S3_R2_STORAGE_BUCKET }}
  S3_R2_STORAGE_REGION: ${{ secrets.S3_R2_STORAGE_REGION }}

jobs:
  build:
    secrets: inherit
    uses: ./.github/workflows/_buildx.yml
    with:
      platforms: 'linux/amd64,linux/arm64'
      build-args: |
        S3_R2_ACCOUNT_ID
        S3_R2_ACCESS_KEY
        S3_R2_SECRET_KEY
        S3_R2_STORAGE_BUCKET
        S3_R2_STORAGE_REGION
