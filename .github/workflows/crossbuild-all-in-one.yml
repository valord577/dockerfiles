name: crossbuild-all-in-one
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/_buildx.yml'
      - '.github/workflows/crossbuild-all-in-one.yml'
      - 'crossbuild-all-in-one/**'
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/_buildx.yml'
      - '.github/workflows/crossbuild-all-in-one.yml'
      - 'crossbuild-all-in-one/**'

jobs:
  _preset:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: ${{ github.workspace }}
    outputs:
      pkgver: ${{ steps.set-pkgver.outputs.pkgver }}
    steps:
      - name: set env `DOCKER_BUILD_VERSION`
        id: set-pkgver
        run: |
          DOCKER_BUILD_VERSION="$(date -u '+%Y%m%dT%H%M%SZ' )-${GITHUB_SHA:0:7}"
          printf "\e[1m\e[33m%s\e[0m\n" "DOCKER_BUILD_VERSION: $DOCKER_BUILD_VERSION"
          echo "pkgver=$DOCKER_BUILD_VERSION" >> "$GITHUB_OUTPUT"
  build:
    needs: _preset
    secrets: inherit
    uses: ./.github/workflows/_buildx.yml
    with:
      platforms: 'linux/amd64,linux/arm64'
      tagvers: ${{ needs._preset.outputs.pkgver }}
      build-args: |
        OS_PACKAGE_MIRROR=
