name: _buildx
on:
  workflow_call:
    inputs:
      platforms:
        default: "linux/amd64"
        required: false
        type: string
      build-args:
        default: ""
        required: false
        type: string
      context:
        default: ${{ github.workflow }}
        required: false
        type: string
      tagname:
        default: ${{ github.workflow }}
        required: false
        type: string
      tagvers:
        default: ${{ github.sha }}
        required: false
        type: string
      target:
        default: ""
        required: false
        type: string
      is_push:
        default: true
        required: false
        type: boolean
      is_push_latest:
        default: true
        required: false
        type: boolean

env:
  GH_TOKEN: ${{ github.token }}
  S3_R2_ACCOUNT_ID: ${{ secrets.S3_R2_ACCOUNT_ID }}
  S3_R2_ACCESS_KEY: ${{ secrets.S3_R2_ACCESS_KEY }}
  S3_R2_SECRET_KEY: ${{ secrets.S3_R2_SECRET_KEY }}
  S3_R2_STORAGE_BUCKET: ${{ secrets.S3_R2_STORAGE_BUCKET }}
  S3_R2_STORAGE_REGION: ${{ secrets.S3_R2_STORAGE_REGION }}

jobs:
  _buildx:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: ${{ github.workspace }}
    env:
      _PUSH: false
    steps:
      - name: Set ENV `_PUSH=true`
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.is_push }}
        run: echo "_PUSH=true" >> "$GITHUB_ENV"
      - name: Git Checkout
        run: |
          git config --global --add safe.directory "*"

          git init
          git remote add x ${{github.server_url}}/${{ github.repository }}.git
          git fetch --no-tags --prune --no-recurse-submodules --depth=1 x +${{ github.sha }}
          git checkout FETCH_HEAD
      - name: Set up Docker QEMU
        uses: docker/setup-qemu-action@v4
        with:
          cache-image: false
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          version: latest
          platforms: ${{ inputs.platforms }}
          cache-binary: false
      - name: Login to Docker Hub
        if: ${{ env._PUSH == 'true' }}
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSCODE }}
      - name: Login to Aliyun ACR
        if: ${{ env._PUSH == 'true' && inputs.is_push_latest }}
        uses: docker/login-action@v4
        with:
          registry: ${{ vars.REGISTRY_ALIYUN_ACR }}
          username: ${{ secrets.ALIYUN_ACR_USERNAME }}
          password: ${{ secrets.ALIYUN_ACR_PASSCODE }}
      - name: Build Image and Push
        if: ${{ inputs.tagvers != '' }}
        uses: docker/build-push-action@v7
        with:
          pull: true
          push: ${{ env._PUSH }}
          context: ${{ github.workspace }}/${{ inputs.context }}
          target: ${{ inputs.target }}
          platforms: ${{ inputs.platforms }}
          build-args: ${{ inputs.build-args }}
          secrets: |
            S3_R2_ACCOUNT_ID=${{ secrets.S3_R2_ACCOUNT_ID }}
            S3_R2_ACCESS_KEY=${{ secrets.S3_R2_ACCESS_KEY }}
            S3_R2_SECRET_KEY=${{ secrets.S3_R2_SECRET_KEY }}
            S3_R2_STORAGE_BUCKET=${{ secrets.S3_R2_STORAGE_BUCKET }}
            S3_R2_STORAGE_REGION=${{ secrets.S3_R2_STORAGE_REGION }}
          tags: |
            ${{ vars.DOCKER_HUB_USERNAME }}/${{ inputs.tagname }}:${{ inputs.tagvers }}
      - name: Build Image and Push (latest)
        if: ${{ env._PUSH == 'true' && inputs.is_push_latest }}
        uses: docker/build-push-action@v7
        with:
          pull: true
          push: ${{ env._PUSH }}
          context: ${{ github.workspace }}/${{ inputs.context }}
          target: ${{ inputs.target }}
          platforms: ${{ inputs.platforms }}
          build-args: ${{ inputs.build-args }}
          secrets: |
            S3_R2_ACCOUNT_ID=${{ secrets.S3_R2_ACCOUNT_ID }}
            S3_R2_ACCESS_KEY=${{ secrets.S3_R2_ACCESS_KEY }}
            S3_R2_SECRET_KEY=${{ secrets.S3_R2_SECRET_KEY }}
            S3_R2_STORAGE_BUCKET=${{ secrets.S3_R2_STORAGE_BUCKET }}
            S3_R2_STORAGE_REGION=${{ secrets.S3_R2_STORAGE_REGION }}
          tags: |
            ${{ vars.DOCKER_HUB_USERNAME }}/${{ inputs.tagname }}:latest
            ${{ vars.REGISTRY_ALIYUN_ACR }}/${{ vars.DOCKER_HUB_USERNAME }}/${{ inputs.tagname }}:latest
