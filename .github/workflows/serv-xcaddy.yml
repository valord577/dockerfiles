name: serv-xcaddy
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/_buildx.yml'
      - '.github/workflows/serv-xcaddy.yml'
      - 'serv-xcaddy/**'
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/_buildx.yml'
      - '.github/workflows/serv-xcaddy.yml'
      - 'serv-xcaddy/**'

jobs:
  build:
    # if: ${{ false }}
    secrets: inherit
    uses: ./.github/workflows/_buildx.yml
    with:
      platforms: 'linux/amd64,linux/arm64'
      tagname: 'xcaddy'
      build-args: |
        PACKAGE_MANAGER_USE_MIRROR=0
